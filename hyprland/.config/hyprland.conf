#########################################################################################
# FINAL HYPRLAND CONFIG (based on transition from Sway)
#########################################################################################

################
### MONITORS ###
################
monitor=,preferred,auto,1.33

###################
### MY PROGRAMS ###
###################
$terminal = footclient
$menu = rofi -show drun -show-icons -theme ~/.config/rofi/hyprland.rasi
$clipboard = cliphist list | rofi -dmenu -theme ~/.config/rofi/hyprland.rasi | cliphist decode | wl-copy
$task_manager = footclient -e btop
$emoji_picker = rofi -show emoji -theme ~/.config/rofi/hyprland.rasi

#################
### AUTOSTART ###
#################
# Foot server (terminal daemon)
exec-once = foot --server
# Activity daemon (sleep, lock screen)
exec-once = hypridle
# Wallpapers (swaybg)
exec-once = swaybg -o eDP-1 -i /home/yegor/aerial-photography-mountain-viewing-full-moon.jpg
# Waybar panel (with our special config)
exec-once = waybar -c ~/.config/waybar/config-hyprland -s ~/.config/waybar/style-hyprland.css
# Mako notifications
exec-once = killall mako; mako -c ~/.config/mako/config-hyprland

#############################
### ENVIRONMENT VARIABLES ###
#############################
env = XCURSOR_SIZE,24
env = HYPRCURSOR_SIZE,24
env = XCURSOR_THEME,BreezeX-Dark
env = HYPRCURSOR_THEME,BreezeX-Dark

#####################
### LOOK AND FEEL ###
#####################
general {
    gaps_in = 3
    gaps_out = 6
    border_size = 2
    col.active_border = rgb(89b4fa) rgb(74c7ec) 45deg
    col.inactive_border = rgb(595959)
    resize_on_border = false
    allow_tearing = false
    layout = dwindle
}

decoration {
    rounding = 10
    rounding_power = 2
    active_opacity = 1.0
    inactive_opacity = 1.0
}

animations {
    enabled = yes

    bezier = popIn, 0.05, 0.7, 0.1, 1
    bezier = popOut, 0.3, 0, 0.8, 0.15
    bezier = smooth, 0.25, 0.9, 0.4, 1

    animation = windows, 1, 3, popIn, popin 80%
    animation = windowsIn, 1, 3, popIn, popin 80%
    animation = windowsOut, 1, 2, popOut, popin 70%
    animation = fade, 1, 3, smooth
    animation = workspaces, 1, 3, smooth, slide
    animation = border, 1, 4, smooth
}

dwindle {
    pseudotile = true
    preserve_split = true
}

master {
    new_status = master
}

misc {
    force_default_wallpaper = -1
    disable_hyprland_logo = true # Remove standard logo background
}

# Disable scaling for XWayland apps (to prevent blurring)
xwayland {
  force_zero_scaling = true
}

#############
### INPUT ###
#############
input {
    kb_layout = us,ru
    kb_variant =
    kb_model =
    kb_options = grp:alt_shift_toggle
    kb_rules =

    follow_mouse = 1
    sensitivity = 0.2 # Slightly accelerate mouse

    touchpad {
        natural_scroll = true # Natural scroll
    }
}

###################
### KEYBINDINGS ###
###################
$mainMod = SUPER

# -----------------------------------------------------
# Basic apps and scripts
# -----------------------------------------------------
bind = $mainMod, Return, exec, $terminal
bind = $mainMod, Q, killactive,
bind = $mainMod, D, exec, $menu
bind = ALT, space, exec, $menu
bind = $mainMod SHIFT, P, exec, $clipboard
bind = $mainMod, W, exec, firefox
bind = $mainMod, S, exec, code
bind = $mainMod, E, exec, pcmanfm
bind = CTRL ALT, Delete, exec, $task_manager
bind = ALT SHIFT, E, exec, $emoji_picker

# Power menu (our tiled horizontal Rofi)
bind = $mainMod SHIFT, E, exec, ~/.config/hypr/scripts/powermenu.sh

# WiFi menu
bind = $mainMod SHIFT, W, exec, ~/.config/hypr/scripts/wifi-menu.sh

# Bluetooth menu
bind = $mainMod SHIFT, T, exec, ~/.config/hypr/scripts/bluetooth-menu.sh

# Reload Waybar
bind = $mainMod SHIFT, B, exec, killall -SIGUSR1 waybar

# -----------------------------------------------------
# Screenshots and screen recording
# -----------------------------------------------------
bind = , Print, exec, ~/.config/hypr/scripts/screenshot.sh screen
bind = $mainMod SHIFT, S, exec, ~/.config/hypr/scripts/screenshot.sh area

bind = $mainMod SHIFT, R, exec, ~/.config/hypr/scripts/screenrecord.sh area
bind = ALT SHIFT, R, exec, ~/.config/hypr/scripts/screenrecord.sh screen
bind = $mainMod, Escape, exec, ~/.config/hypr/scripts/screenrecord.sh

# -----------------------------------------------------
# Lock (laptop lid + hotkey)
# -----------------------------------------------------
bindl = , switch:on:Lid Switch, exec, hyprlock
bind = $mainMod, L, exec, hyprlock

# -----------------------------------------------------
# Multimedia and function keys
# -----------------------------------------------------
bindel = , XF86AudioRaiseVolume, exec, wpctl set-volume -l 1.0 @DEFAULT_AUDIO_SINK@ 5%+
bindel = , XF86AudioLowerVolume, exec, wpctl set-volume @DEFAULT_AUDIO_SINK@ 5%-
bindl  = , XF86AudioMute, exec, wpctl set-mute @DEFAULT_AUDIO_SINK@ toggle
bindl  = , XF86AudioMicMute, exec, wpctl set-mute @DEFAULT_AUDIO_SOURCE@ toggle

bindel = , XF86MonBrightnessUp, exec, brightnessctl -e4 -n2 set 5%+
bindel = , XF86MonBrightnessDown, exec, brightnessctl -e4 -n2 set 5%-

bindl  = , XF86AudioPlay, exec, playerctl play-pause
bindl  = , XF86AudioNext, exec, playerctl next
bindl  = , XF86AudioPrev, exec, playerctl previous
bind = , XF86Search, exec, $menu

# -----------------------------------------------------
# Windows and Layouts (Focus, Move)
# -----------------------------------------------------
bind = $mainMod, B, togglesplit,
bind = $mainMod, V, togglesplit,
bind = $mainMod, F, fullscreen, 1
bind = $mainMod SHIFT, F, fullscreen, 0
bind = $mainMod, space, togglefloating,
bind = $mainMod, space, centerwindow,

# Focus (arrows + HJKL)
bind = $mainMod, left, movefocus, l
bind = $mainMod, right, movefocus, r
bind = $mainMod, up, movefocus, u
bind = $mainMod, down, movefocus, d
bind = $mainMod, H, movefocus, l
bind = $mainMod, L, movefocus, r
bind = $mainMod, K, movefocus, u
bind = $mainMod, J, movefocus, d

# Move window (arrows + HJKL)
bind = $mainMod SHIFT, left, movewindow, l
bind = $mainMod SHIFT, right, movewindow, r
bind = $mainMod SHIFT, up, movewindow, u
bind = $mainMod SHIFT, down, movewindow, d
bind = $mainMod SHIFT, H, movewindow, l
bind = $mainMod SHIFT, L, movewindow, r
bind = $mainMod SHIFT, K, movewindow, u
bind = $mainMod SHIFT, J, movewindow, d

bindm = $mainMod, mouse:272, movewindow
bindm = $mainMod, mouse:273, resizewindow

# -----------------------------------------------------
# Workspaces
# -----------------------------------------------------
bind = $mainMod, 1, workspace, 1
bind = $mainMod, 2, workspace, 2
bind = $mainMod, 3, workspace, 3
bind = $mainMod, 4, workspace, 4
bind = $mainMod, 5, workspace, 5
bind = $mainMod, 6, workspace, 6
bind = $mainMod, 7, workspace, 7
bind = $mainMod, 8, workspace, 8
bind = $mainMod, 9, workspace, 9
bind = $mainMod, 0, workspace, 10

bind = $mainMod SHIFT, 1, movetoworkspace, 1
bind = $mainMod SHIFT, 2, movetoworkspace, 2
bind = $mainMod SHIFT, 3, movetoworkspace, 3
bind = $mainMod SHIFT, 4, movetoworkspace, 4
bind = $mainMod SHIFT, 5, movetoworkspace, 5
bind = $mainMod SHIFT, 6, movetoworkspace, 6
bind = $mainMod SHIFT, 7, movetoworkspace, 7
bind = $mainMod SHIFT, 8, movetoworkspace, 8
bind = $mainMod SHIFT, 9, movetoworkspace, 9
bind = $mainMod SHIFT, 0, movetoworkspace, 10

# Navigation "back and forth"
bind = $mainMod, Tab, workspace, previous
bind = ALT, Tab, cyclenext,
bind = ALT, Tab, bringactivetotop,

# Empty workspaces (analog of first-empty-workspace.py)
bind = $mainMod, N, workspace, empty
bind = $mainMod SHIFT, N, movetoworkspace, empty



