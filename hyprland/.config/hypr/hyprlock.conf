background {
    monitor =
    path = screenshot   # Делает скриншот текущего экрана
    blur_passes = 3     # Сила размытия
    blur_size = 8
}

input-field {
    monitor =
    size = 250, 50
    outline_thickness = 3
    dots_size = 0.33
    dots_spacing = 0.15
    dots_center = true
    outer_color = rgb(30, 30, 46)
    inner_color = rgb(200, 200, 200)
    font_color = rgb(10, 10, 10)
    fade_on_empty = false
    placeholder_text = <i>Enter password...</i>
    hide_input = false
    position = 0, -50
    halign = center
    valign = center
}

label {
    monitor =
    text = $TIME
    font_size = 60
    font_family = JetBrainsMono NF
    color = rgb(200, 200, 200)
    position = 0, 50
    halign = center
    valign = center
}
